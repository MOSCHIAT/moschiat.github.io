<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moschiat</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

/* PARTICULAS */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* CONTEUDO */

.container{
position:relative;
z-index:1;
text-align:center;
max-width:600px;
padding:40px;
}

.logo{
width:220px;
margin-bottom:30px;
}

p{
font-size:18px;
opacity:0.8;
}

/* BOTÕES */

.buttons{
margin-top:35px;
display:flex;
justify-content:center;
gap:15px;
}

.cta{
padding:14px 30px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

/* WHATSAPP PULSANDO */

.whatsapp{
background:#25D366;
color:black;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(37,211,102,0.7)}
70%{box-shadow:0 0 0 20px rgba(37,211,102,0)}
100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}
}

.exclusiveBtn{
background:white;
color:black;
cursor:pointer;
}

.cta:hover{
transform:scale(1.05);
}

/* SENHA */

.passwordBox{
margin-top:25px;
opacity:0;
max-height:0;
overflow:hidden;
transition:all 0.6s ease;
}

.passwordBox.show{
opacity:1;
max-height:100px;
}

input{
padding:12px;
border-radius:6px;
border:none;
}

button{
padding:12px 25px;
border:none;
border-radius:6px;
margin-left:10px;
cursor:pointer;
}

.erro{
color:red;
margin-top:10px;
display:none;
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<img class="logo"
src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEif-oYA9Ub7-c94KnddIbzUn73cLsiYw5hzbFoTA5qUw-VXV0RYAqgE2B8HksU6iHpogwKktpI5iJqd1PfcdBnGMIMPZ9QVqnVw449OKNlYwzkkfwSSlscFns10T1MyRFTJ3WCCGwkCR2nKxOfDB1ZoZCUb8mwesizs4Rw-n_qUgwhXmam1c41yEfjHyxKE/s1600/MOSCHIATlogo.png">

<p>
Criação de identidade visual para artistas e projetos digitais.<br>
Capas de álbum • Visualizers • Motion design
</p>

<div class="buttons">

<a class="cta whatsapp"
href="https://wa.me/5511972000152?text=Olá%20quero%20saber%20sobre%20capas%20e%20visualizers">
WhatsApp
</a>

<div class="cta exclusiveBtn" onclick="mostrarSenha()">
Acesso exclusivo
</div>

</div>

<div class="passwordBox" id="passwordBox">

<input type="password" id="senha" placeholder="Digite a senha">

<button onclick="verificarSenha()">Entrar</button>

<div id="erro" class="erro">
Senha incorreta
</div>

</div>

</div>

<script>

/* MOSTRAR SENHA */

function mostrarSenha(){
document.getElementById("passwordBox").classList.add("show")
}

function verificarSenha(){

let senha = document.getElementById("senha").value

if(senha === "vip2026"){
window.location.href = "12.html"
}

else{
document.getElementById("erro").style.display = "block"
}

}

/* PARTICULAS */

const canvas = document.getElementById("particles")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let particles = []

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*0.5
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="rgba(255,255,255,0.3)"

for(let i=0;i<particles.length;i++){

let p = particles[i]

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true)
ctx.fill()

p.y += p.d

if(p.y>canvas.height){
p.y=0
}

}

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
